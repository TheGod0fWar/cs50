<!doctype html>

<html lang="en">
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap"
      rel="stylesheet"
    />
    <link href="/static/styles.css" rel="stylesheet" />
    <title>Birthdays</title>
  </head>
  <body>
    <div class="header">
      <h1>Birthdays</h1>
    </div>
    <div class="container">
      <div class="section">
        <h2>Add a Birthday</h2>
        
        <!-- TODO: Create a form for users to submit a name, a month, and a day -->
        <form action="/" method="post">
          <label for="field1">Name:</label>
          <input type="text" name="name" id="field1" required>

          <label for="field2">Month:</label>
          <input type="text" name="month" id="field2" required>

          <label for="field3">Day:</label>
          <input type="text" name="day" id="field3" required>

          <input type="submit" value="Add Birthday">
        </form>
      </div>


      <div class="section">
        <h2>All Birthdays</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Birthday</th>
            </tr>
          </thead>
          <tbody>
            <!-- TODO: Loop through the database entries to display them in this table -->
            {% for birthday in query %}
              <tr>
                <td>{{ birthday.name }}</td>
                <td>{{ birthday.month }}/{{ birthday.day }}</td>
              </tr>
            {% endfor %}
</tbody
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
